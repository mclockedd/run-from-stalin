name: Build and publish image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mclockedd/run-from-stalin:latest

      # Optional: auto-tell Render to redeploy once the new image is published.
      # Add a repo secret named RENDER_DEPLOY_HOOK (the Deploy Hook URL from
      # Render → your service → Settings) to enable this. Without it, you just
      # click "Manual Deploy" in Render after the image finishes building.
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            echo "Triggering Render deploy..."
            curl -fsSL "$HOOK"
          else
            echo "No RENDER_DEPLOY_HOOK secret set; skipping auto-deploy."
          fi
